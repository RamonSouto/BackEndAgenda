  /api/relatorios/auditoria:
    get:
      tags:
        - Relatórios
      summary: Relatório de auditoria (logs)
      description: |
        Gera relatório completo de auditoria com todos os logs do sistema.

        **Permissões:**
        - Apenas Administrador
      operationId: relatorioAuditoria
      security:
        - bearerAuth: []
      parameters:
        - name: id_usuario
          in: query
          description: Filtrar por usuário
          schema:
            type: integer
        - name: acao
          in: query
          description: Filtrar por ação
          schema:
            type: string
        - name: tabela
          in: query
          description: Filtrar por tabela
          schema:
            type: string
        - name: data_inicio
          in: query
          description: Data inicial (formato ISO 8601)
          schema:
            type: string
            format: date-time
        - name: data_fim
          in: query
          description: Data final (formato ISO 8601)
          schema:
            type: string
            format: date-time
        - name: limite
          in: query
          description: Limite de resultados
          schema:
            type: integer
            default: 100
      responses:
        "200":
          description: Relatório de auditoria
          content:
            application/json:
              schema:
                type: object
                properties:
                  sucesso:
                    type: boolean
                    example: true
                  dados:
                    type: object
                    properties:
                      total_logs:
                        type: integer
                        example: 250
                      periodo:
                        type: object
                        properties:
                          inicio:
                            type: string
                            format: date-time
                          fim:
                            type: string
                            format: date-time
                      por_acao:
                        type: object
                        example:
                          criar: 100
                          editar: 80
                          deletar: 20
                          consultar: 50
                      por_usuario:
                        type: array
                        items:
                          type: object
                          properties:
                            nome:
                              type: string
                              example: Administrador do Sistema
                            tipo:
                              type: string
                              example: administrador
                            total:
                              type: integer
                              example: 150
                      por_tabela:
                        type: object
                        example:
                          tab_agendamentos: 120
                          tab_pessoas: 80
                          tab_produto_agendamento: 50
                      logs_detalhados:
                        type: array
                        items:
                          $ref: "#/components/schemas/Log"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"

