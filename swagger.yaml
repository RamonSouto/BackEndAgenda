openapi: 3.0.4
info:
  title: API de Agenda de Ajustes Pós-Cirúrgicos
  description: |
    Sistema completo para gerenciamento de agenda de ajustes de produtos pós-cirúrgicos.

    ## Características
    - Autenticação JWT com controle de permissões
    - Cadastro de pessoas com diferentes papéis
    - Gestão de agendamentos com regras de negócio
    - Upload de fotos de ajustes
    - Sistema de logs para auditoria
    - Notificações via WhatsApp
    - Relatórios e dashboard

    ## Tipos de Usuário
    - **Administrador**: Acesso total ao sistema
    - **Secretária**: Cadastro de pacientes e agendamentos
    - **Costureira**: Registro de comparecimento e upload de fotos
    - **Médico**: Visualização de relatórios
    - **Paciente**: Recebe notificações (sem acesso ao sistema)

    ## Autenticação
    A maioria dos endpoints requer autenticação via JWT. 
    Obtenha um token através do endpoint `/api/auth/login` e inclua-o no header:
    ```
    Authorization: Bearer {seu_token}
    ```

  version: 1.0.0
  contact:
    name: Ramon David Souto
    email: rdssi@hotmail.com
  license:
    name: ISC
    url: https://opensource.org/licenses/ISC

servers:
  - url: http://localhost:3000
    description: Servidor de desenvolvimento
  - url: https://api.sistema.com
    description: Servidor de produção

tags:
  - name: Autenticação
    description: Endpoints de autenticação e gerenciamento de sessão
  - name: Pessoas
    description: Gerenciamento de pessoas (usuários, pacientes, etc)
  - name: Agendamentos
    description: Gerenciamento de agendamentos de ajustes
  - name: Produtos
    description: Gerenciamento de produtos e fotos de ajustes
  - name: Categoria
    description: Gerenciamento da categorias de produtos
  - name: Tamanho
    description: Gerenciamento dos tamanhos de produtos
  - name: Cor e Estampa
    description: Gerenciamento das cores e estampas
  - name: Grade de Produto
    description: Gerenciamento das grades dos produtos
  - name: Relatórios
    description: Relatórios e estatísticas do sistema
  - name: Sistema
    description: Endpoints de sistema e health check

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Token JWT obtido através do login

  schemas:
    # Schema de Erro
    Error:
      type: object
      properties:
        sucesso:
          type: boolean
          example: false
        mensagem:
          type: string
          example: Erro na operação
        erro:
          type: string
          example: Detalhes do erro

    # Schema de Sucesso
    Success:
      type: object
      properties:
        sucesso:
          type: boolean
          example: true
        mensagem:
          type: string
          example: Operação realizada com sucesso

    # Schema de Login
    LoginRequest:
      type: object
      required:
        - num_cpf
        - des_senha
      properties:
        num_cpf:
          type: string
          minLength: 11
          maxLength: 11
          pattern: '^\d{11}$'
          description: CPF sem formatação (apenas números)
          example: "00000000000"
        des_senha:
          type: string
          minLength: 6
          description: Senha do usuário
          example: "senha123"

    LoginResponse:
      type: object
      properties:
        sucesso:
          type: boolean
          example: true
        mensagem:
          type: string
          example: Login realizado com sucesso
        dados:
          type: object
          properties:
            token:
              type: string
              example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
            usuario:
              type: object
              properties:
                id:
                  type: integer
                  example: 1
                nome:
                  type: string
                  example: Administrador do Sistema
                cpf:
                  type: string
                  example: "00000000000"
                tipo:
                  type: string
                  enum:
                    [administrador, secretaria, costureira, medico, paciente]
                  example: administrador
                email:
                  type: string
                  example: admin@sistema.com

    # Schema de Cor e Estampa
    CorEstampaInput:
      type: object
      required:
        - nom_cor_estampa
        - ind_tipo
      properties:
        nom_cor_estampa:
          type: string
          minLength: 1
          maxLength: 100
          description: Descrição da cor ou estampa
          example: Estampa bege lisa
        ind_tipo:
          type: string
          enum: [cor, estampa]
          description: Descrição do tipo
          example: cor
        val_codigo_hex:
          type: string
          description: Descrição da cor
          example: #FFFFFF
        des_imagem_url:
          type: string
          minLength: 3
          maxLength: 500
          description: Descrição do caminho da imagem
          example: \pasta_cor_estampa
        num_ordem_exibicao:
          type: integer
          description: Numero da ordem de exibição
          example: 1

    CorEstampa:
      allOf:
        - $ref: "#/components/schemas/CorEstampaInput"
        - type: object
          properties:
            id:
              type: integer
              example: 1
            created_at:
              type: string
              format: date-time
              example: "2024-01-15T10:30:00Z"
            updated_at:
              type: string
              format: date-time
              example: "2024-01-15T10:30:00Z"
            deleted_at:
              type: string
              format: date-time
              example: "2024-01-15T10:30:00Z"

    # Schema de Grade de Produto
    GradeProdutoInput:
      type: object
      required:
        - id_produto
        - id_tamanho
      properties:
        id_produto:
          type: integer
          description: Descrição ID do produto
          example: 1
        id_tamanho:
          type: integer
          description: Descrição ID do tamanho
          example: 1
        id_variacao_cor_estampa:
          type: integer
          description: Descrição ID da variação de cor e estampa
          example: 1
        num_sku:
          type: string
          minLength: 3
          maxLength: 50
          description: Número de SKU do Produto
          example: 653412-KS
        val_preco_variacao:
          type: number
          format: double
          description: Valor de venda grade produto
          example: 10,99
        ind_ativo:
          type: boolean
          description: Indicação se grade de produto e ativo ou não
          example: true
        num_codigo_barras:
          type: string
          minLength: 13
          maxLength: 100
          description: Número do código de barras da grade de produto
          example: 1234567890123
    GradeProduto:
      allOf:
        - $ref: "#/components/schemas/GradeProdutoInput"
        - type: object
          properties:
            id:
              type: integer
              example: 1
            created_at:
              type: string
              format: date-time
              example: "2024-01-15T10:30:00Z"
            updated_at:
              type: string
              format: date-time
              example: "2024-01-15T10:30:00Z"
            deleted_at:
              type: string
              format: date-time
              example: "2024-01-15T10:30:00Z"

    # Schema de Tamanho
    TamanhoInput:
      type: object
      required:
        - cod_tamanho
        - des_tamanho
        - des_categoria_tamanho
        - num_ordem_exibicao
      properties:
        cod_tamanho:
          type: string
          minLength: 1
          maxLength: 10
          description: Código do tamanho
          example: P
        des_tamanho:
          type: string
          minLength: 3
          maxLength: 50
          description: Descrição do tamanho
          example: Pequeno
        des_categoria_tamanho:
          type: string
          enum: [vestuario, calcados, acessorios, outros]
          description: Descrição da categoria
          example: Vestuario

    Tamanho:
      allOf:
        - $ref: "#/components/schemas/TamanhoInput"
        - type: object
          properties:
            cod_tamanho:
              type: string
              minLength: 1
              maxLength: 10
              description: Código do tamanho
              example: P
            des_tamanho:
              type: string
              minLength: 3
              maxLength: 50
              description: Descrição do tamanho
              example: Pequeno
            des_categoria_tamanho:
              type: string
              enum: [vestuario, calcados, acessorios, outros]
              description: Descrição da categoria
              example: Vestuario
            created_at:
              type: string
              format: date-time
              example: "2024-01-15T10:30:00Z"
            updated_at:
              type: string
              format: date-time
              example: "2024-01-15T10:30:00Z"

    # Schema de Categoria
    CategoriaInput:
      type: object
      required:
        - nom_categoria
        - id_pai
      properties:
        nom_categoria:
          type: string
          minLength: 3
          maxLength: 50
          description: Nome da Categoria
          example: Bermudas
        id_pai:
          type: integer
          description: ID da categoria pai
          example: 1

    Categoria:
      allOf:
        - $ref: "#/components/schemas/CategoriaInput"
        - type: object
          properties:
            id:
              type: integer
              example: 1
            nom_categoria:
              type: string
              example: Bermudas
            id_pai:
              type: integer
              example: 1
            created_at:
              type: string
              format: date-time
              example: "2024-01-15T10:30:00Z"
            updated_at:
              type: string
              format: date-time
              example: "2024-01-15T10:30:00Z"

    # Schema de Pessoa
    PessoaInput:
      type: object
      required:
        - id_cidade
        - ind_tipo_pessoa
        - nom_completo
        - num_cpf
        - num_rg
        - dta_nascimento
        - des_logradouro
        - num_endereco
        - num_cep
        - nom_bairro
        - num_celular_1
        - des_email_1
      properties:
        id_cidade:
          type: integer
          description: ID da cidade
          example: 1
        ind_status:
          type: string
          enum: [ativo, inativo]
          default: ativo
          example: ativo
        ind_tipo_pessoa:
          type: string
          enum: [medico, secretaria, costureira, paciente, administrador]
          description: Tipo de pessoa/usuário
          example: paciente
        nom_completo:
          type: string
          maxLength: 255
          description: Nome completo
          example: João da Silva Santos
        num_cpf:
          type: string
          minLength: 11
          maxLength: 11
          pattern: '^\d{11}$'
          description: CPF sem formatação
          example: "12345678901"
        num_rg:
          type: string
          maxLength: 20
          description: RG
          example: "1234567"
        dta_nascimento:
          type: string
          format: date
          description: Data de nascimento
          example: "1990-05-15"
        des_logradouro:
          type: string
          maxLength: 255
          description: Logradouro (rua, avenida, etc)
          example: Rua das Flores
        num_endereco:
          type: string
          maxLength: 10
          description: Número do endereço
          example: "123"
        des_complemento:
          type: string
          maxLength: 100
          nullable: true
          description: Complemento do endereço
          example: Apartamento 201
        num_cep:
          type: string
          minLength: 8
          maxLength: 8
          pattern: '^\d{8}$'
          description: CEP sem formatação
          example: "74000000"
        nom_bairro:
          type: string
          maxLength: 100
          description: Nome do bairro/setor
          example: Centro
        num_celular_1:
          type: string
          maxLength: 15
          description: Celular principal
          example: "62999999999"
        ind_whatsapp_1:
          type: boolean
          default: true
          description: Indica se celular 1 tem WhatsApp
          example: true
        num_celular_2:
          type: string
          maxLength: 15
          nullable: true
          description: Celular secundário
          example: "62988888888"
        ind_whatsapp_2:
          type: boolean
          default: true
          description: Indica se celular 2 tem WhatsApp
          example: false
        des_email_1:
          type: string
          format: email
          maxLength: 255
          description: Email principal
          example: joao@email.com
        des_email_2:
          type: string
          format: email
          maxLength: 255
          nullable: true
          description: Email secundário
          example: joao2@email.com
        des_senha:
          type: string
          minLength: 6
          description: Senha (obrigatória para secretaria, costureira, admin e medico)
          example: senha123

    Pessoa:
      allOf:
        - $ref: "#/components/schemas/PessoaInput"
        - type: object
          properties:
            id:
              type: integer
              example: 1
            nom_cidade:
              type: string
              example: Goiânia
            nom_estado:
              type: string
              example: Goiás
            sgl_estado:
              type: string
              example: GO
            created_at:
              type: string
              format: date-time
              example: "2024-01-15T10:30:00Z"
            updated_at:
              type: string
              format: date-time
              example: "2024-01-15T10:30:00Z"

    PessoaList:
      type: object
      properties:
        sucesso:
          type: boolean
          example: true
        total:
          type: integer
          example: 10
        dados:
          type: array
          items:
            $ref: "#/components/schemas/Pessoa"

    # Schema de Agendamento
    AgendamentoInput:
      type: object
      required:
        - id_paciente
        - id_costureira
        - id_secretaria
        - dta_agendamento
        - produtos
      properties:
        id_paciente:
          type: integer
          description: ID do paciente
          example: 5
        id_costureira:
          type: integer
          description: ID da costureira
          example: 3
        id_secretaria:
          type: integer
          description: ID da secretária que está criando
          example: 2
        dta_agendamento:
          type: string
          format: date-time
          description: Data e hora do agendamento (deve ser futura)
          example: "2024-12-31T14:00:00Z"
        des_observacoes_geral:
          type: string
          nullable: true
          description: Observações gerais sobre o agendamento
          example: Paciente necessita de ajuste urgente
        produtos:
          type: array
          minItems: 1
          description: Lista de produtos para ajuste
          items:
            type: object
            required:
              - id_produto_grade
            properties:
              id_produto_grade:
                type: integer
                description: ID do produto na grade
                example: 10
              des_ajuste_produto:
                type: string
                nullable: true
                description: Descrição do ajuste necessário
                example: Ajustar manga esquerda

    Agendamento:
      type: object
      properties:
        id:
          type: integer
          example: 1
        dta_agendamento:
          type: string
          format: date-time
          example: "2024-12-31T14:00:00Z"
        ind_status:
          type: string
          enum: [agendado, confirmado, concluido, cancelado, falta]
          example: agendado
        ind_paciente_compareceu:
          type: boolean
          nullable: true
          example: null
        des_observacoes_geral:
          type: string
          nullable: true
          example: Paciente necessita de ajuste urgente
        des_observacoes_costureira:
          type: string
          nullable: true
          example: Ajuste realizado conforme solicitado
        paciente_id:
          type: integer
          example: 5
        paciente_nome:
          type: string
          example: João da Silva Santos
        paciente_cpf:
          type: string
          example: "12345678901"
        paciente_celular:
          type: string
          example: "62999999999"
        paciente_email:
          type: string
          example: joao@email.com
        costureira_id:
          type: integer
          example: 3
        costureira_nome:
          type: string
          example: Ana Costureira Santos
        secretaria_id:
          type: integer
          example: 2
        secretaria_nome:
          type: string
          example: Maria Secretária Silva
        produtos:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
                example: 1
              id_produto_grade:
                type: integer
                example: 10
              nom_produto:
                type: string
                example: Blusa Manga Longa
              ref_produto:
                type: string
                example: BML-001
              num_sku:
                type: string
                example: BML-001-P-AZ
              cod_tamanho:
                type: string
                example: P
              nom_cor_estampa:
                type: string
                example: Azul
              des_ajuste_produto:
                type: string
                example: Ajustar manga esquerda
              ind_status:
                type: string
                enum: [pendente, producao, concluido, cancelado]
                example: pendente
              fotos:
                type: array
                items:
                  $ref: "#/components/schemas/Foto"
        created_at:
          type: string
          format: date-time
          example: "2024-01-15T10:30:00Z"
        updated_at:
          type: string
          format: date-time
          example: "2024-01-15T10:30:00Z"

    AgendamentoList:
      type: object
      properties:
        sucesso:
          type: boolean
          example: true
        total:
          type: integer
          example: 15
        dados:
          type: array
          items:
            $ref: "#/components/schemas/Agendamento"

    # Schema de Comparecimento
    ComparecimentoInput:
      type: object
      required:
        - ind_paciente_compareceu
      properties:
        ind_paciente_compareceu:
          type: boolean
          description: Indica se o paciente compareceu
          example: true
        des_observacoes_costureira:
          type: string
          nullable: true
          description: Observações da costureira sobre o atendimento
          example: Paciente compareceu e ajuste foi realizado com sucesso

    # Schema de Foto
    Foto:
      type: object
      properties:
        id:
          type: integer
          example: 1
        id_produto_agendamento:
          type: integer
          example: 1
        des_caminho_arquivo:
          type: string
          example: uploads/ajustes/foto-1234567890.jpg
        nom_original:
          type: string
          example: foto_ajuste.jpg
        num_tamanho_bytes:
          type: integer
          example: 2048576
        created_at:
          type: string
          format: date-time
          example: "2024-01-15T10:30:00Z"

    FotoList:
      type: object
      properties:
        sucesso:
          type: boolean
          example: true
        total:
          type: integer
          example: 5
        dados:
          type: array
          items:
            $ref: "#/components/schemas/Foto"

    # Schema de Log
    Log:
      type: object
      properties:
        id:
          type: integer
          example: 1
        id_usuario:
          type: integer
          nullable: true
          example: 1
        des_acao:
          type: string
          example: criar
        des_tabela:
          type: string
          example: tab_agendamentos
        num_registro_id:
          type: integer
          nullable: true
          example: 10
        des_detalhes:
          type: object
          example: { "paciente": "João da Silva", "data": "2024-12-31" }
        num_ip_address:
          type: string
          nullable: true
          example: "192.168.1.1"
        des_user_agent:
          type: string
          nullable: true
          example: "Mozilla/5.0..."
        created_at:
          type: string
          format: date-time
          example: "2024-01-15T10:30:00Z"
        usuario_nome:
          type: string
          nullable: true
          example: Administrador do Sistema
        usuario_tipo:
          type: string
          nullable: true
          example: administrador

    # Schema de Dashboard
    Dashboard:
      type: object
      properties:
        sucesso:
          type: boolean
          example: true
        dados:
          type: object
          properties:
            mes_atual:
              type: object
              properties:
                total:
                  type: integer
                  example: 45
                concluidos:
                  type: integer
                  example: 30
                cancelados:
                  type: integer
                  example: 5
                ativos:
                  type: integer
                  example: 10
            hoje:
              type: object
              properties:
                total:
                  type: integer
                  example: 3
                agendamentos:
                  type: array
                  items:
                    $ref: "#/components/schemas/Agendamento"
            costureiras:
              type: object
              properties:
                total:
                  type: integer
                  example: 5
                disponiveis:
                  type: integer
                  example: 3
                ocupadas:
                  type: integer
                  example: 2

    # Schema de Estatísticas
    Estatisticas:
      type: object
      properties:
        sucesso:
          type: boolean
          example: true
        dados:
          type: object
          properties:
            total:
              type: integer
              example: 100
            por_status:
              type: object
              example:
                agendado: 20
                confirmado: 15
                concluido: 50
                cancelado: 10
                falta: 5
            comparecimentos:
              type: object
              properties:
                total:
                  type: integer
                  example: 70
                compareceram:
                  type: integer
                  example: 60
                faltas:
                  type: integer
                  example: 10
                taxa_comparecimento:
                  type: string
                  example: "85.71%"

  # Respostas comuns reutilizáveis
  responses:
    UnauthorizedError:
      description: Token de autenticação ausente ou inválido
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            sucesso: false
            mensagem: Não autorizado
            erro: Token não fornecido ou inválido

    ForbiddenError:
      description: Usuário não tem permissão para executar esta ação
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            sucesso: false
            mensagem: Acesso negado
            erro: Você não tem permissão para executar esta ação
paths:
  # ==================== AUTENTICAÇÃO ====================
  /api/auth/login:
    post:
      tags:
        - Autenticação
      summary: Login de usuário
      description: |
        Realiza o login no sistema e retorna um token JWT.

        **Tipos de usuário que podem fazer login:**
        - Administrador
        - Secretária
        - Costureira
        - Médico

        **Nota:** Pacientes não têm acesso ao sistema, apenas recebem notificações.
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
            examples:
              admin:
                summary: Login como Administrador
                value:
                  num_cpf: "12345678909"
                  des_senha: "admin123"
              secretaria:
                summary: Login como Secretária
                value:
                  num_cpf: "11111111111"
                  des_senha: "senha123"
              costureira:
                summary: Login como Costureira
                value:
                  num_cpf: "22222222222"
                  des_senha: "senha123"
      responses:
        "200":
          description: Login realizado com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "400":
          description: Dados inválidos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                sucesso: false
                mensagem: Erro de validação
                erro: CPF e senha são obrigatórios
        "401":
          description: Credenciais inválidas
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                sucesso: false
                mensagem: Credenciais inválidas
                erro: CPF ou senha incorretos
        "429":
          description: Muitas tentativas de login
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                sucesso: false
                mensagem: Muitas tentativas de login
                erro: Você excedeu o limite de tentativas. Tente novamente em 15 minutos

  /api/auth/logout:
    post:
      tags:
        - Autenticação
      summary: Logout de usuário
