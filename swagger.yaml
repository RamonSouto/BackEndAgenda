  /api/produtos/{id_produto_agendamento}/fotos:
    post:
      tags:
        - Produtos
      summary: Upload de foto de ajuste (única)
      description: |
        Faz upload de uma foto do ajuste realizado.

        **Regras:**
        - Tamanho máximo: 5MB
        - Formatos aceitos: JPG, JPEG, PNG

        **Permissões:**
        - Costureira: Pode fazer upload
        - Administrador: Pode fazer upload
      operationId: uploadFotoAjuste
      security:
        - bearerAuth: []
      parameters:
        - name: id_produto_agendamento
          in: path
          required: true
          description: ID do produto agendamento
          schema:
            type: integer
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - foto
              properties:
                foto:
                  type: string
                  format: binary
                  description: Arquivo de imagem (JPG, JPEG ou PNG)
      responses:
        "201":
          description: Foto enviada com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  sucesso:
                    type: boolean
                    example: true
                  mensagem:
                    type: string
                    example: Foto enviada com sucesso
                  dados:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                      nome_arquivo:
                        type: string
                        example: foto-1234567890.jpg
                      caminho:
                        type: string
                        example: uploads/ajustes/foto-1234567890.jpg
                      tamanho:
                        type: string
                        example: 2.5 MB
        "400":
          description: Erro no upload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                arquivoGrande:
                  summary: Arquivo muito grande
                  value:
                    sucesso: false
                    mensagem: Arquivo muito grande
                    erro: Tamanho máximo permitido é 5 MB
                tipoInvalido:
                  summary: Tipo de arquivo inválido
                  value:
                    sucesso: false
                    mensagem: Arquivo inválido
                    erro: Tipo de arquivo não permitido. Tipos aceitos JPG, JPEG, PNG
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
    get:
      tags:
        - Produtos
      summary: Listar fotos de ajuste
      description: Lista todas as fotos de um produto do agendamento
      operationId: listarFotosAjuste
      security:
        - bearerAuth: []
      parameters:
        - name: id_produto_agendamento
          in: path
          required: true
          description: ID do produto agendamento
          schema:
            type: integer
      responses:
        "200":
          description: Lista de fotos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FotoList"
        "400":
          description: ID inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          $ref: "#/components/responses/UnauthorizedError"

