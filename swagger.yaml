  # ==================== AGENDAMENTOS ====================
  /api/agendamentos:
    get:
      tags:
        - Agendamentos
      summary: Listar agendamentos com filtros
      description: |
        Lista agendamentos com opção de filtros.

        **Regras:**
        - Costureiras veem apenas seus próprios agendamentos
        - Secretárias não veem observações das costureiras
        - Administradores veem tudo
      operationId: listarAgendamentos
      security:
        - bearerAuth: []
      parameters:
        - name: id_paciente
          in: query
          description: Filtrar por paciente
          schema:
            type: integer
        - name: id_costureira
          in: query
          description: Filtrar por costureira
          schema:
            type: integer
        - name: id_secretaria
          in: query
          description: Filtrar por secretária
          schema:
            type: integer
        - name: status
          in: query
          description: Filtrar por status
          schema:
            type: string
            enum: [agendado, confirmado, concluido, cancelado, falta]
        - name: data_inicio
          in: query
          description: Data inicial (formato ISO 8601)
          schema:
            type: string
            format: date-time
        - name: data_fim
          in: query
          description: Data final (formato ISO 8601)
          schema:
            type: string
            format: date-time
        - name: limite
          in: query
          description: Limite de resultados
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Lista de agendamentos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgendamentoList"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
    post:
      tags:
        - Agendamentos
      summary: Criar novo agendamento
      description: |
        Cria um novo agendamento no sistema.

        **Regras:**
        - Apenas uma costureira pode ter um agendamento ativo por vez
        - Data do agendamento deve ser futura
        - Deve incluir pelo menos um produto

        **Permissões:**
        - Secretária: Pode criar
        - Costureira: Pode criar
        - Administrador: Pode criar
      operationId: criarAgendamento
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgendamentoInput"
      responses:
        "201":
          description: Agendamento criado com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  sucesso:
                    type: boolean
                    example: true
                  mensagem:
                    type: string
                    example: Registro criado com sucesso
                  dados:
                    $ref: "#/components/schemas/Agendamento"
        "400":
          description: Dados inválidos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                costureiraOcupada:
                  summary: Costureira já possui agendamento ativo
                  value:
                    sucesso: false
                    mensagem: Costureira já possui um agendamento ativo
                dataPassada:
                  summary: Data no passado
                  value:
                    sucesso: false
                    mensagem: Data do agendamento deve ser futura
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"

  /api/agendamentos/{id}:
    get:
      tags:
        - Agendamentos
      summary: Buscar agendamento por ID
      description: |
        Retorna os dados completos de um agendamento, incluindo produtos e fotos.

        **Regras:**
        - Secretárias não veem observações das costureiras
      operationId: buscarAgendamentoPorId
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: ID do agendamento
          schema:
            type: integer
      responses:
        "200":
          description: Dados do agendamento
          content:
            application/json:
              schema:
                type: object
                properties:
                  sucesso:
                    type: boolean
                    example: true
                  dados:
                    $ref: "#/components/schemas/Agendamento"
        "400":
          description: ID inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          description: Agendamento não encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    put:
      tags:
        - Agendamentos
      summary: Atualizar agendamento
      description: |
        Atualiza os dados de um agendamento.

        **Regras:**
        - Secretária pode atualizar apenas seus próprios agendamentos
        - Costureira pode atualizar apenas seus próprios agendamentos
