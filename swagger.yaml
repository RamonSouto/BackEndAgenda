  # ==================== PESSOAS ====================
  /api/pessoas:
    get:
      tags:
        - Pessoas
      summary: Listar pessoas com filtros
      description: |
        Lista todas as pessoas cadastradas no sistema com opção de filtros.

        **Permissões:**
        - Secretária: Pode listar
        - Administrador: Pode listar
      operationId: listarPessoas
      security:
        - bearerAuth: []
      parameters:
        - name: tipo
          in: query
          description: Filtrar por tipo de pessoa
          schema:
            type: string
            enum: [medico, secretaria, costureira, paciente, administrador]
        - name: status
          in: query
          description: Filtrar por status
          schema:
            type: string
            enum: [ativo, inativo]
        - name: busca
          in: query
          description: Buscar por nome ou CPF
          schema:
            type: string
      responses:
        "200":
          description: Lista de pessoas
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PessoaList"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
    post:
      tags:
        - Pessoas
      summary: Criar nova pessoa
      description: |
        Cadastra uma nova pessoa no sistema.

        **Permissões:**
        - Secretária: Pode criar apenas pacientes
        - Administrador: Pode criar qualquer tipo
      operationId: criarPessoa
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PessoaInput"
            examples:
              paciente:
                summary: Criar Paciente
                value:
                  id_cidade: 1
                  ind_tipo_pessoa: paciente
                  nom_completo: João da Silva Santos
                  num_cpf: "12345678901"
                  num_rg: "1234567"
                  dta_nascimento: "1990-05-15"
                  des_logradouro: Rua das Flores
                  num_endereco: "123"
                  des_complemento: Apartamento 201
                  num_cep: "74000000"
                  nom_bairro: Centro
                  num_celular_1: "62999999999"
                  ind_whatsapp_1: true
                  des_email_1: joao@email.com
              secretaria:
                summary: Criar Secretária
                value:
                  id_cidade: 1
                  ind_tipo_pessoa: secretaria
                  nom_completo: Maria Silva
                  num_cpf: "98765432100"
                  num_rg: "7654321"
                  dta_nascimento: "1988-03-20"
                  des_logradouro: Avenida Principal
                  num_endereco: "456"
                  num_cep: "74100000"
                  nom_bairro: Setor Bueno
                  num_celular_1: "62988888888"
                  des_email_1: maria@sistema.com
                  des_senha: senha123
      responses:
        "201":
          description: Pessoa criada com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  sucesso:
                    type: boolean
                    example: true
                  mensagem:
                    type: string
                    example: Registro criado com sucesso
                  dados:
                    $ref: "#/components/schemas/Pessoa"
        "400":
          description: Dados inválidos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                cpfInvalido:
                  summary: CPF inválido
                  value:
                    sucesso: false
                    mensagem: Erro de validação
                    erro: CPF inválido
                cpfExistente:
                  summary: CPF já cadastrado
                  value:
                    sucesso: false
                    mensagem: CPF já cadastrado
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"

