  /api/auth/alterar-senha:
    put:
      tags:
        - Autenticação
      summary: Alterar senha do próprio usuário
      description: Permite que o usuário altere sua própria senha
      operationId: alterarSenha
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - senha_atual
                - nova_senha
                - confirmar_senha
              properties:
                senha_atual:
                  type: string
                  description: Senha atual do usuário
                  example: senha123
                nova_senha:
                  type: string
                  minLength: 6
                  description: Nova senha (mínimo 6 caracteres)
                  example: novaSenha456
                confirmar_senha:
                  type: string
                  description: Confirmação da nova senha
                  example: novaSenha456
      responses:
        "200":
          description: Senha alterada com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Success"
              example:
                sucesso: true
                mensagem: Senha alterada com sucesso
        "400":
          description: Erro na validação
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                senhasNaoCoincidem:
                  summary: Senhas não coincidem
                  value:
                    sucesso: false
                    mensagem: Erro de validação
                    erro: Nova senha e confirmação não coincidem
                senhaAtualIncorreta:
                  summary: Senha atual incorreta
                  value:
                    sucesso: false
                    mensagem: Senha atual incorreta
        "401":
          $ref: "#/components/responses/UnauthorizedError"

