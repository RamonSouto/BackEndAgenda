  # ==================== PRODUTOS AGENDAMENTO ====================
  /api/produtos/agendamento:
    post:
      tags:
        - Produtos
      summary: Adicionar produto ao agendamento
      description: |
        Adiciona um produto à lista de produtos de um agendamento.

        **Permissões:**
        - Secretária: Pode adicionar
        - Costureira: Pode adicionar
        - Administrador: Pode adicionar
      operationId: adicionarProdutoAgendamento
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - id_agendamento
                - id_produto_grade
              properties:
                id_agendamento:
                  type: integer
                  description: ID do agendamento
                  example: 1
                id_produto_grade:
                  type: integer
                  description: ID do produto na grade
                  example: 10
                des_ajuste_produto:
                  type: string
                  nullable: true
                  description: Descrição do ajuste necessário
                  example: Ajustar manga direita
                ind_status:
                  type: string
                  enum: [pendente, producao, concluido, cancelado]
                  default: pendente
                  example: pendente
      responses:
        "201":
          description: Produto adicionado com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  sucesso:
                    type: boolean
                    example: true
                  mensagem:
                    type: string
                    example: Registro criado com sucesso
                  dados:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
        "400":
          description: Dados inválidos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"

  /api/produtos/agendamento/{id_agendamento}:
    get:
      tags:
        - Produtos
      summary: Listar produtos de um agendamento
      description: Lista todos os produtos vinculados a um agendamento, incluindo fotos
      operationId: listarProdutosAgendamento
      security:
        - bearerAuth: []
      parameters:
        - name: id_agendamento
          in: path
          required: true
          description: ID do agendamento
          schema:
            type: integer
      responses:
        "200":
          description: Lista de produtos do agendamento
          content:
            application/json:
              schema:
                type: object
                properties:
                  sucesso:
                    type: boolean
                    example: true
                  total:
                    type: integer
                    example: 3
                  dados:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 1
                        id_produto_grade:
                          type: integer
                          example: 10
                        nom_produto:
                          type: string
                          example: Blusa Manga Longa
                        ref_produto:
                          type: string
                          example: BML-001
                        num_sku:
                          type: string
                          example: BML-001-P-AZ
                        cod_tamanho:
                          type: string
                          example: P
                        nom_cor_estampa:
                          type: string
                          example: Azul
                        des_ajuste_produto:
                          type: string
                          example: Ajustar manga direita
                        ind_status:
                          type: string
                          example: pendente
                        fotos:
                          type: array
                          items:
                            $ref: "#/components/schemas/Foto"
        "400":
          description: ID inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          $ref: "#/components/responses/UnauthorizedError"

