            application/json:
              schema:
                type: object
                properties:
                  sucesso:
                    type: boolean
                    example: true
                  total:
                    type: integer
                    description: Total de costureiras
                    example: 5
                  disponiveis:
                    type: integer
                    description: Número de costureiras disponíveis
                    example: 3
                  dados:
                    type: array
                    items:
                      allOf:
                        - $ref: "#/components/schemas/Pessoa"
